<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Biblioteca de Babel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --white:#ffffff; --off:#f5f7fa; --soft:#eef1f6;
  --blue:#0a84ff; --cyan:#00c8ff; --violet:#7b5cfa;
  --glass:rgba(255,255,255,0.72); --glass2:rgba(255,255,255,0.45);
  --border:rgba(0,180,255,0.18); --border2:rgba(120,100,255,0.15);
  --text:#0d1117; --muted:#4a5568; --subtle:#8896a8;
  --glow:rgba(0,200,255,0.12); --glow2:rgba(123,92,250,0.1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;
  background:var(--off);font-family:'Space Grotesk',sans-serif;
  color:var(--text);cursor:none;}

/* ── BG ── */
#bg{position:fixed;inset:0;z-index:0;overflow:hidden;}
#bg-gradient{position:absolute;inset:0;
  background:radial-gradient(ellipse 120% 80% at 60% 20%,
    rgba(0,200,255,0.08) 0%,rgba(123,92,250,0.06) 40%,transparent 70%),
  radial-gradient(ellipse 80% 60% at 20% 80%,
    rgba(0,180,255,0.06) 0%,transparent 60%),
  linear-gradient(160deg,#f0f4ff 0%,#e8f0fe 40%,#f5f0ff 100%);}

/* GRID LINES */
#grid{position:absolute;inset:0;opacity:0.4;
  background-image:
    linear-gradient(rgba(0,180,255,0.08) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,180,255,0.08) 1px,transparent 1px);
  background-size:60px 60px;}

/* ORBS */
.orb{position:absolute;border-radius:50%;pointer-events:none;
  filter:blur(60px);}
#orb1{width:500px;height:500px;top:-100px;right:-100px;
  background:radial-gradient(circle,rgba(0,200,255,0.15),transparent 70%);
  animation:orbFloat 12s ease infinite alternate;}
#orb2{width:400px;height:400px;bottom:-80px;left:-80px;
  background:radial-gradient(circle,rgba(123,92,250,0.12),transparent 70%);
  animation:orbFloat 15s ease infinite alternate-reverse;}
#orb3{width:300px;height:300px;top:40%;left:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(0,200,255,0.08),transparent 70%);
  animation:orbFloat 10s ease infinite alternate;}
@keyframes orbFloat{from{transform:translate(0,0);}to{transform:translate(20px,30px);}}

/* FLOATING PARTICLES */
.fp{position:absolute;border-radius:50%;pointer-events:none;
  animation:fpFloat linear infinite;}
@keyframes fpFloat{
  0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
  10%{opacity:1;}90%{opacity:0.6;}
  100%{transform:translateY(-100px) rotate(360deg);opacity:0;}}

/* CURSOR */
#cur{position:fixed;z-index:9999;pointer-events:none;
  width:20px;height:20px;transform:translate(-50%,-50%);}
#cur::before{content:'';position:absolute;inset:3px;border-radius:50%;
  background:var(--cyan);opacity:0.8;animation:curPulse 2s ease infinite;}
#cur::after{content:'';position:absolute;inset:0;border-radius:50%;
  border:1.5px solid rgba(0,200,255,0.4);animation:curRing 2s ease infinite;}
#cur-trail{position:fixed;z-index:9998;pointer-events:none;
  width:40px;height:40px;transform:translate(-50%,-50%);
  border-radius:50%;border:1px solid rgba(0,200,255,0.15);
  transition:left 0.12s ease,top 0.12s ease;}
@keyframes curPulse{0%,100%{transform:scale(1);opacity:0.8;}50%{transform:scale(1.3);opacity:1;}}
@keyframes curRing{0%,100%{transform:scale(1);opacity:0.4;}50%{transform:scale(1.5);opacity:0;}}

/* ── CORRIDOR ── */
#viewport{position:fixed;inset:0;z-index:1;
  perspective:700px;perspective-origin:50% 44%;overflow:hidden;}
#corridor{position:absolute;inset:0;transform-style:preserve-3d;}

.seg{position:absolute;top:0;left:0;width:100%;height:100%;
  transform-style:preserve-3d;}

/* Floor */
.floor{position:absolute;bottom:0;left:0;right:0;height:48%;
  transform-origin:bottom;transform:rotateX(70deg);
  background:
    repeating-linear-gradient(90deg,rgba(0,180,255,0.06) 0,rgba(0,180,255,0.06) 1px,transparent 1px,transparent 80px),
    repeating-linear-gradient(0deg,rgba(0,180,255,0.06) 0,rgba(0,180,255,0.06) 1px,transparent 1px,transparent 80px),
    linear-gradient(to bottom,rgba(230,240,255,0.9),rgba(210,225,255,0.7));}
/* Ceiling */
.ceil{position:absolute;top:0;left:0;right:0;height:40%;
  transform-origin:top;transform:rotateX(-70deg);
  background:linear-gradient(to top,rgba(230,240,255,0.8),rgba(240,248,255,0.5));}

/* Walls */
.wall-l,.wall-r{position:absolute;top:0;bottom:0;width:22%;
  background:linear-gradient(to right,
    rgba(240,246,255,0.95),rgba(235,243,255,0.85));
  transform-style:preserve-3d;backdrop-filter:blur(2px);}
.wall-l{left:0;transform-origin:left;transform:rotateY(36deg);}
.wall-r{right:0;transform-origin:right;transform:rotateY(-36deg);}

/* Shelf units on walls */
.shelf-unit{position:absolute;top:6%;bottom:25%;width:100%;
  display:flex;flex-direction:column;justify-content:space-around;padding:0 6px;}
.shelf-row{height:52px;
  background:linear-gradient(180deg,rgba(220,235,255,0.9) 0%,rgba(200,220,255,0.7) 100%);
  border-bottom:2px solid rgba(0,180,255,0.2);
  border-radius:2px;
  box-shadow:0 2px 8px rgba(0,150,255,0.08);
  display:flex;align-items:flex-end;padding:0 4px 3px;gap:2px;overflow:hidden;}

/* Books */
.book{border-radius:2px 2px 0 0;flex-shrink:0;cursor:pointer;
  transition:transform 0.2s,box-shadow 0.2s;
  box-shadow:1px 0 3px rgba(0,100,200,0.15);}
.book.clickable:active{transform:translateY(-8px);
  box-shadow:0 8px 20px rgba(0,150,255,0.3);}
.book.glow{animation:bookGlowFut 2s ease infinite alternate;}
@keyframes bookGlowFut{
  from{box-shadow:0 0 8px rgba(0,200,255,0.3),1px 0 3px rgba(0,100,200,0.15);}
  to{box-shadow:0 0 20px rgba(0,200,255,0.6),0 -4px 16px rgba(123,92,250,0.3);
     transform:translateY(-3px);}}

/* Hologram pillars */
.holo{position:absolute;width:3px;background:linear-gradient(to top,
    transparent,var(--cyan),rgba(0,200,255,0.3),transparent);
  animation:holoFlicker 3s ease infinite alternate;
  box-shadow:0 0 12px rgba(0,200,255,0.4);}
@keyframes holoFlicker{from{opacity:0.6;transform:scaleX(1);}
  to{opacity:1;transform:scaleX(1.5);}}

/* Ambient lights */
.alight{position:absolute;border-radius:50%;pointer-events:none;
  animation:alightPulse 4s ease infinite alternate;}
@keyframes alightPulse{from{opacity:0.4;}to{opacity:0.8;}}

/* VIGNETTE — soft */
#vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 90% 80% at 50% 44%,
    transparent 30%,rgba(220,235,255,0.3) 65%,rgba(210,228,255,0.7) 100%);}

/* DEPTH FOG */
#fog{position:absolute;top:0;left:0;right:0;bottom:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 50% 60% at 50% 44%,
    rgba(255,255,255,0) 0%,rgba(240,248,255,0.5) 70%,rgba(230,242,255,0.85) 100%);}

/* ── TITLE BAR ── */
#topbar{position:fixed;top:0;left:0;right:0;z-index:20;
  padding:18px 24px 16px;
  background:linear-gradient(to bottom,rgba(240,248,255,0.95) 0%,transparent 100%);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  pointer-events:none;}
#topbar h1{font-family:'Cinzel',serif;font-size:clamp(1.1rem,3.5vw,1.8rem);
  color:var(--text);letter-spacing:0.14em;font-weight:400;
  text-shadow:0 0 30px rgba(0,180,255,0.2);}
#topbar p{font-family:'Cormorant',serif;font-style:italic;
  font-size:0.72rem;color:var(--subtle);letter-spacing:0.18em;}

/* WALK HINT */
#walk-hint{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  z-index:20;text-align:center;animation:fadeUp 2s 2s both;pointer-events:none;}
#walk-hint p{font-family:'Cormorant',serif;font-style:italic;
  font-size:0.82rem;color:var(--muted);letter-spacing:0.1em;
  background:rgba(255,255,255,0.7);padding:8px 18px;border-radius:20px;
  border:1px solid var(--border);backdrop-filter:blur(8px);}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px);}
  to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* ── MODAL (bibliotecario menu) ── */
#modal{position:fixed;inset:0;z-index:50;display:flex;
  align-items:flex-end;justify-content:center;
  background:rgba(220,235,255,0.4);backdrop-filter:blur(12px);
  opacity:0;pointer-events:none;transition:opacity 0.4s;}
#modal.on{opacity:1;pointer-events:all;}
#modal-inner{width:100%;max-width:520px;
  background:rgba(255,255,255,0.95);
  border-top:1px solid rgba(0,180,255,0.25);
  border-left:1px solid rgba(0,180,255,0.12);
  border-right:1px solid rgba(0,180,255,0.12);
  border-radius:20px 20px 0 0;
  padding:28px 24px 40px;
  box-shadow:0 -20px 60px rgba(0,150,255,0.12),0 -2px 20px rgba(123,92,250,0.08);
  transform:translateY(100%);transition:transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94);}
#modal.on #modal-inner{transform:translateY(0);}

.modal-handle{width:36px;height:4px;border-radius:2px;
  background:rgba(0,180,255,0.2);margin:0 auto 20px;}
.modal-eyebrow{font-size:0.68rem;color:var(--subtle);letter-spacing:0.2em;
  text-transform:uppercase;text-align:center;margin-bottom:6px;font-weight:500;}
.modal-title{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--text);
  text-align:center;margin-bottom:4px;letter-spacing:0.08em;font-weight:400;}
.modal-sub{font-family:'Cormorant',serif;font-style:italic;font-size:0.8rem;
  color:var(--subtle);text-align:center;margin-bottom:20px;}
.modal-rule{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);
  margin-bottom:20px;}

.modal-label{font-size:0.7rem;color:var(--subtle);letter-spacing:0.16em;
  text-transform:uppercase;display:block;margin-bottom:8px;font-weight:500;}
#mq{width:100%;background:var(--soft);border:1.5px solid var(--border);
  border-radius:12px;color:var(--text);font-family:'Cormorant',serif;
  font-style:italic;font-size:1.05rem;padding:12px 16px;text-align:center;
  outline:none;cursor:none;transition:border-color 0.3s,box-shadow 0.3s;}
#mq::placeholder{color:var(--subtle);}
#mq:focus{border-color:rgba(0,180,255,0.4);
  box-shadow:0 0 0 3px rgba(0,180,255,0.08);}

.mgr{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:14px 0;}
.mpill{font-size:0.74rem;color:var(--muted);
  border:1.5px solid rgba(0,150,200,0.15);border-radius:20px;
  padding:5px 14px;cursor:pointer;transition:all 0.22s;
  background:var(--soft);font-weight:500;letter-spacing:0.02em;}
.mpill:hover,.mpill.on{color:var(--blue);border-color:rgba(0,150,255,0.4);
  background:rgba(0,180,255,0.06);
  box-shadow:0 0 0 3px rgba(0,180,255,0.06);}

.mbrow{display:flex;gap:10px;margin-top:18px;}
.mbtn{flex:1;font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.14em;
  color:var(--blue);background:rgba(0,180,255,0.06);
  border:1.5px solid rgba(0,180,255,0.25);border-radius:12px;
  padding:12px 16px;cursor:pointer;transition:all 0.25s;text-align:center;}
.mbtn:hover{background:rgba(0,180,255,0.12);border-color:rgba(0,180,255,0.5);
  box-shadow:0 4px 16px rgba(0,150,255,0.15);}
.mbtn:active{transform:scale(0.97);}
.mbtn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.mbtn.primary:hover{background:#0070e0;box-shadow:0 4px 20px rgba(0,130,255,0.35);}
.mbtn-close{position:absolute;top:18px;right:18px;
  background:var(--soft);border:1px solid var(--border);border-radius:50%;
  width:30px;height:30px;cursor:pointer;font-size:0.8rem;color:var(--muted);
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.mbtn-close:hover{background:rgba(0,180,255,0.08);color:var(--blue);}

/* ── NARRATOR ── */
#narr{position:fixed;inset:0;z-index:40;display:flex;
  align-items:center;justify-content:center;padding:32px;
  background:rgba(240,248,255,0.85);backdrop-filter:blur(20px);
  opacity:0;pointer-events:none;transition:opacity 0.6s;}
#narr.on{opacity:1;}
#narr-inner{max-width:500px;text-align:center;}
#narr-icon{font-size:2rem;margin-bottom:16px;
  animation:narIcon 2s ease infinite alternate;}
@keyframes narIcon{from{transform:scale(1);}to{transform:scale(1.1);}}
#narr-text{font-family:'Cormorant',serif;font-style:italic;
  font-size:clamp(1.05rem,2.5vw,1.3rem);color:var(--text);
  line-height:2;letter-spacing:0.02em;}
#narr-coords{font-size:0.68rem;color:var(--subtle);letter-spacing:0.14em;
  margin-top:16px;font-weight:500;}

/* ── LOADING ── */
#loading{position:fixed;inset:0;z-index:45;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;
  background:rgba(240,248,255,0.9);backdrop-filter:blur(20px);
  opacity:0;pointer-events:none;transition:opacity 0.4s;}
#loading.on{opacity:1;pointer-events:all;}
.loader-ring{width:56px;height:56px;border-radius:50%;
  border:3px solid rgba(0,180,255,0.15);
  border-top:3px solid var(--cyan);
  animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#load-msg{font-family:'Cormorant',serif;font-style:italic;
  font-size:1rem;color:var(--muted);
  max-width:300px;text-align:center;line-height:1.8;
  animation:breathe 2.5s ease infinite;}
@keyframes breathe{0%,100%{opacity:0.5;}50%{opacity:1;}}
.load-bar{width:200px;height:2px;background:rgba(0,180,255,0.1);
  border-radius:1px;overflow:hidden;}
.load-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--violet));
  border-radius:1px;animation:loadFill 2s ease infinite;}
@keyframes loadFill{0%{width:0;margin-left:0;}50%{width:100%;margin-left:0;}
  100%{width:0;margin-left:100%;}}

/* ── BOOK DISPLAY ── */
#book-display{position:fixed;inset:0;z-index:46;
  background:rgba(248,252,255,0.98);
  opacity:0;pointer-events:none;transition:opacity 0.5s;
  display:flex;flex-direction:column;overflow:hidden;}
#book-display.on{opacity:1;pointer-events:all;}

/* Book header */
#bd-header{flex-shrink:0;padding:20px 24px 16px;
  background:rgba(255,255,255,0.95);
  border-bottom:1px solid rgba(0,180,255,0.1);
  display:flex;flex-direction:column;gap:8px;}
#bd-eyebrow{font-size:0.62rem;color:var(--subtle);letter-spacing:0.2em;
  text-transform:uppercase;font-weight:500;}
#bd-title{font-family:'Cinzel',serif;font-size:clamp(1.1rem,3.5vw,1.6rem);
  color:var(--text);line-height:1.3;font-weight:400;letter-spacing:0.04em;}
#bd-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.bd-tag{font-size:0.62rem;color:var(--blue);letter-spacing:0.1em;
  border:1px solid rgba(0,150,255,0.25);border-radius:20px;
  padding:3px 12px;background:rgba(0,180,255,0.05);font-weight:500;}
#bd-author-line{font-family:'Cormorant',serif;font-style:italic;
  font-size:0.8rem;color:var(--muted);}

/* Book body */
#bd-body{flex:1;overflow-y:auto;padding:28px 24px;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;}
#bd-body::-webkit-scrollbar{width:3px;}
#bd-body::-webkit-scrollbar-track{background:transparent;}
#bd-body::-webkit-scrollbar-thumb{background:rgba(0,180,255,0.2);border-radius:2px;}

#bd-text{font-family:'Cormorant',serif;
  font-size:clamp(1rem,2.2vw,1.12rem);color:var(--text);
  line-height:2.1;letter-spacing:0.015em;white-space:pre-wrap;}
.translation-divider{display:flex;align-items:center;gap:12px;margin:28px 0 20px;}
.translation-divider::before,.translation-divider::after{content:'';flex:1;
  height:1px;background:linear-gradient(90deg,transparent,rgba(0,180,255,0.2),transparent);}
.translation-label{font-size:0.65rem;color:var(--subtle);letter-spacing:0.2em;
  text-transform:uppercase;font-weight:500;white-space:nowrap;}
#bd-translation{font-family:'Cormorant',serif;font-style:italic;
  font-size:clamp(0.9rem,2vw,1rem);color:var(--muted);
  line-height:2;white-space:pre-wrap;}

/* Book footer */
#bd-footer{flex-shrink:0;padding:14px 24px 28px;
  background:rgba(255,255,255,0.95);
  border-top:1px solid rgba(0,180,255,0.1);
  display:flex;flex-direction:column;gap:10px;}
#bd-coords{font-size:0.62rem;color:var(--subtle);letter-spacing:0.1em;
  text-align:center;font-weight:500;}
.bd-actions{display:flex;gap:10px;}
.bd-btn{flex:1;font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.14em;
  padding:12px;border-radius:12px;cursor:pointer;transition:all 0.25s;
  text-align:center;font-weight:400;}
.bd-btn.sec{color:var(--blue);background:rgba(0,180,255,0.06);
  border:1.5px solid rgba(0,180,255,0.22);}
.bd-btn.sec:hover{background:rgba(0,180,255,0.1);
  box-shadow:0 4px 12px rgba(0,150,255,0.12);}
.bd-btn.pri{color:#fff;background:var(--blue);border:1.5px solid var(--blue);}
.bd-btn.pri:hover{background:#0070e0;box-shadow:0 4px 20px rgba(0,130,255,0.3);}

/* PROGRESS BAR */
#progress{position:fixed;top:0;left:0;height:2px;z-index:30;
  background:linear-gradient(90deg,var(--cyan),var(--violet));
  transition:width 0.3s;width:0%;box-shadow:0 0 8px rgba(0,200,255,0.5);}

/* FLOAT QUOTE */
#fquote{position:fixed;bottom:16px;right:16px;z-index:9;pointer-events:none;
  max-width:220px;text-align:right;}
#fquote p{font-family:'Cormorant',serif;font-style:italic;
  font-size:0.66rem;color:var(--subtle);line-height:1.75;
  background:rgba(255,255,255,0.7);padding:8px 12px;border-radius:10px;
  border:1px solid var(--border);backdrop-filter:blur(8px);
  opacity:0;transition:opacity 1.2s;}
#fquote p.vis{opacity:1;}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-trail"></div>
<div id="progress"></div>

<!-- BG -->
<div id="bg">
  <div id="bg-gradient"></div>
  <div id="grid"></div>
  <div class="orb" id="orb1"></div>
  <div class="orb" id="orb2"></div>
  <div class="orb" id="orb3"></div>
</div>

<!-- CORRIDOR -->
<div id="viewport">
  <div id="corridor"></div>
  <div id="fog"></div>
</div>
<div id="vignette"></div>

<!-- TOP BAR -->
<div id="topbar">
  <h1>La Biblioteca de Babel</h1>
  <p>jorge luis borges · 1941</p>
</div>

<!-- WALK HINT -->
<div id="walk-hint">
  <p>desliza para avanzar · toca un libro</p>
</div>

<!-- MODAL -->
<div id="modal">
  <div id="modal-inner" style="position:relative">
    <div class="modal-handle"></div>
    <button class="mbtn-close" id="modal-close">✕</button>
    <p class="modal-eyebrow">El bibliotecario</p>
    <div class="modal-title">La Biblioteca de Babel</div>
    <p class="modal-sub">Todo lo que puede ser escrito ya existe en estas salas</p>
    <div class="modal-rule"></div>
    <label class="modal-label">¿Qué busca el viajero?</label>
    <input type="text" id="mq" placeholder="el nombre de lo que se perdió…"
      autocomplete="off" spellcheck="false"/>
    <div class="mgr" id="mgr">
      <button class="mpill on" data-g="cuento">Cuento</button>
      <button class="mpill" data-g="poema">Poema</button>
      <button class="mpill" data-g="ensayo">Ensayo</button>
      <button class="mpill" data-g="enciclopedia">Enciclopedia</button>
      <button class="mpill" data-g="fragmento">Fragmento</button>
      <button class="mpill" data-g="carta">Carta</button>
      <button class="mpill" data-g="diario">Diario</button>
    </div>
    <div class="mbrow">
      <button class="mbtn" id="mbtn-wander">◌ Dejarme perder</button>
      <button class="mbtn primary" id="mbtn-seek">✦ Buscar</button>
    </div>
  </div>
</div>

<!-- NARRATOR -->
<div id="narr">
  <div id="narr-inner">
    <div id="narr-icon">◈</div>
    <p id="narr-text"></p>
    <p id="narr-coords"></p>
  </div>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="loader-ring"></div>
  <p id="load-msg">El bibliotecario recorre las galerías…</p>
  <div class="load-bar"><div class="load-fill"></div></div>
</div>

<!-- BOOK DISPLAY -->
<div id="book-display">
  <div id="bd-header">
    <div id="bd-eyebrow"></div>
    <div id="bd-title"></div>
    <div id="bd-meta"></div>
    <div id="bd-author-line"></div>
  </div>
  <div id="bd-body">
    <div id="bd-text"></div>
    <div id="bd-trans-block" style="display:none">
      <div class="translation-divider">
        <span class="translation-label">Traducción al español</span>
      </div>
      <div id="bd-translation"></div>
    </div>
  </div>
  <div id="bd-footer">
    <div id="bd-coords"></div>
    <div class="bd-actions">
      <button class="bd-btn sec" id="bd-back">← Volver</button>
      <button class="bd-btn pri" id="bd-new">◌ Nueva obra</button>
    </div>
  </div>
</div>

<!-- FLOAT QUOTE -->
<div id="fquote"><p id="fqp"></p></div>

<script>
// ── CURSOR ──
const curEl=document.getElementById('cur'),trailEl=document.getElementById('cur-trail');
let cx=0,cy=0;
document.addEventListener('mousemove',e=>{
  cx=e.clientX;cy=e.clientY;
  curEl.style.left=cx+'px';curEl.style.top=cy+'px';
  setTimeout(()=>{trailEl.style.left=cx+'px';trailEl.style.top=cy+'px';},80);
});

// ── FLOATING PARTICLES ──
function spawnParticle(){
  const p=document.createElement('div');p.className='fp';
  const size=2+Math.random()*4;
  const colors=['rgba(0,200,255,0.4)','rgba(123,92,250,0.35)','rgba(0,180,255,0.3)'];
  p.style.cssText=`
    width:${size}px;height:${size}px;
    left:${Math.random()*100}%;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    animation-duration:${8+Math.random()*12}s;
    animation-delay:${Math.random()*8}s;
    filter:blur(${Math.random()>0.5?1:0}px);`;
  document.getElementById('bg').appendChild(p);
  setTimeout(()=>p.remove(),20000);
}
for(let i=0;i<12;i++) spawnParticle();
setInterval(spawnParticle,2000);

// ── BOOK COLORS (futuristic) ──
const bookColors=[
  'rgba(0,180,255,0.25)','rgba(123,92,250,0.22)','rgba(0,200,180,0.2)',
  'rgba(255,100,150,0.18)','rgba(255,180,0,0.2)','rgba(0,150,200,0.3)',
  'rgba(100,80,240,0.25)','rgba(0,220,200,0.22)','rgba(200,100,255,0.2)',
  'rgba(0,160,255,0.35)','rgba(80,200,255,0.2)','rgba(150,100,255,0.28)',
];
const bookBorders=[
  'rgba(0,180,255,0.5)','rgba(123,92,250,0.45)','rgba(0,200,180,0.4)',
  'rgba(255,100,150,0.4)','rgba(255,180,0,0.4)','rgba(0,150,200,0.55)',
];

// ── CORRIDOR ──
const corridor=document.getElementById('corridor');
const SEG_DEPTH=900;const NUM_SEGS=7;
let segments=[];let targetZ=0;let camZ=0;

function randColor(i){return bookColors[i%bookColors.length];}
function randBorder(i){return bookBorders[i%bookBorders.length];}

function buildShelfRow(clickable,si){
  const row=document.createElement('div');row.className='shelf-row';
  const n=Math.floor(Math.random()*12)+6;
  for(let i=0;i<n;i++){
    const b=document.createElement('div');b.className='book'+(clickable?' clickable':'');
    const ci=(si*n+i)%bookColors.length;
    const w=7+Math.random()*12;const h=28+Math.random()*20;
    b.style.cssText=`width:${w}px;height:${h}px;
      background:${randColor(ci)};
      border-left:2px solid ${randBorder(ci)};
      border-top:1px solid ${randBorder(ci)};`;
    if(clickable){
      b.addEventListener('click',e=>{e.stopPropagation();openModal();});
      b.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();openModal();},{passive:false});
    }
    row.appendChild(b);
  }
  return row;
}

function buildShelfUnit(side,clickable){
  const unit=document.createElement('div');unit.className='shelf-unit';
  for(let i=0;i<5;i++) unit.appendChild(buildShelfRow(clickable,i));
  return unit;
}

function buildHolo(x,h){
  const d=document.createElement('div');d.className='holo';
  d.style.cssText=`left:${x}%;bottom:28%;height:${h}%;`;
  return d;
}

function buildAmbientLight(x,y,color,size){
  const a=document.createElement('div');a.className='alight';
  a.style.cssText=`left:${x}%;top:${y}%;width:${size}px;height:${size}px;
    background:radial-gradient(circle,${color},transparent 70%);
    transform:translate(-50%,-50%);filter:blur(20px);`;
  return a;
}

function buildSeg(index){
  const seg=document.createElement('div');seg.className='seg';
  seg.style.transform=`translateZ(${-(index*SEG_DEPTH)}px)`;

  const fl=document.createElement('div');fl.className='floor';
  const cl=document.createElement('div');cl.className='ceil';
  const wl=document.createElement('div');wl.className='wall-l';
  const wr=document.createElement('div');wr.className='wall-r';

  const clickable=index<=2;
  wl.appendChild(buildShelfUnit('left',clickable));
  wr.appendChild(buildShelfUnit('right',clickable));

  // Hologram pillars
  if(index%2===0){
    seg.appendChild(buildHolo(30,35));
    seg.appendChild(buildHolo(70,28));
  }
  // Ambient lights
  seg.appendChild(buildAmbientLight(25,45,'rgba(0,200,255,0.15)',200));
  seg.appendChild(buildAmbientLight(75,45,'rgba(123,92,250,0.12)',180));

  seg.appendChild(fl);seg.appendChild(cl);seg.appendChild(wl);seg.appendChild(wr);
  corridor.appendChild(seg);
  return seg;
}

for(let i=0;i<NUM_SEGS;i++) segments.push(buildSeg(i));

// ── SCROLL / SWIPE ──
let hintGone=false;let touchStartY=0;

function advance(delta){
  targetZ+=delta;
  if(!hintGone){
    document.getElementById('walk-hint').style.opacity='0';
    hintGone=true;
  }
  const pct=((targetZ/8000)*100)%100;
  document.getElementById('progress').style.width=Math.abs(pct)+'%';
}

function tick(){
  camZ+=(targetZ-camZ)*0.09;
  segments.forEach(seg=>{
    const raw=parseFloat(seg.style.transform.replace('translateZ(',''));
    const z=raw+camZ;
    const display=z;
    if(z>400){
      const minZ=Math.min(...segments.map(s=>parseFloat(s.style.transform.replace('translateZ(',''))+camZ));
      const newRaw=parseFloat(seg.style.transform.replace('translateZ(',''))-NUM_SEGS*SEG_DEPTH;
      seg.style.transform=`translateZ(${newRaw}px)`;
    }
  });
  requestAnimationFrame(tick);
}
tick();

document.addEventListener('wheel',e=>{e.preventDefault();advance(e.deltaY*1.8);},{passive:false});
document.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchmove',e=>{
  const dy=touchStartY-e.touches[0].clientY;
  touchStartY=e.touches[0].clientY;
  advance(dy*3.2);
},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp'||e.key==='w') advance(100);
  if(e.key==='ArrowDown'||e.key==='s') advance(-100);
  if(e.key==='Escape') closeAll();
});

// ── MODAL ──
let genre='cuento';
function openModal(){
  document.getElementById('modal').classList.add('on');
  setTimeout(()=>document.getElementById('mq').focus(),500);
}
function closeModal(){document.getElementById('modal').classList.remove('on');}
document.getElementById('modal-close').addEventListener('click',closeModal);
document.getElementById('modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal')) closeModal();
});
document.getElementById('mgr').querySelectorAll('.mpill').forEach(p=>{
  p.addEventListener('click',()=>{
    document.querySelectorAll('.mpill').forEach(x=>x.classList.remove('on'));
    p.classList.add('on');genre=p.dataset.g;
  });
});
document.getElementById('mbtn-seek').addEventListener('click',()=>{
  const v=document.getElementById('mq').value.trim();
  if(!v){document.getElementById('mq').focus();return;}
  closeModal();seekBook(v,false);
});
document.getElementById('mbtn-wander').addEventListener('click',()=>{
  closeModal();seekBook('',true);
});
document.getElementById('mq').addEventListener('keydown',e=>{
  if(e.key==='Enter') document.getElementById('mbtn-seek').click();
});
function closeAll(){
  closeModal();
  document.getElementById('narr').classList.remove('on');
  document.getElementById('loading').classList.remove('on');
  document.getElementById('book-display').classList.remove('on');
}
document.getElementById('bd-back').addEventListener('click',()=>{
  document.getElementById('book-display').classList.remove('on');
});
document.getElementById('bd-new').addEventListener('click',()=>{
  document.getElementById('book-display').classList.remove('on');
  openModal();
});

// ── DATA ──
const topics=[
  'el último ser humano en recordar el color azul',
  'una carta que atravesó el tiempo sin llegar',
  'la ciudad que soñaron y nunca construyeron',
  'el momento en que alguien decidió olvidar',
  'el animal que guarda el nombre secreto del universo',
  'la conversación entre dos estrellas que agonizaban',
  'el invento que lo habría cambiado todo',
  'una memoria que pertenece a alguien que aún no nació',
  'el espejo que recordaba lo que nadie recordaba',
  'el nombre que un dios olvidó pronunciar',
];

const langs=[
  {code:'es',name:'Español',style:'hispanic'},
  {code:'en',name:'English',style:'english'},
  {code:'fr',name:'Français',style:'french'},
  {code:'de',name:'Deutsch',style:'german'},
  {code:'it',name:'Italiano',style:'italian'},
  {code:'pt',name:'Português',style:'portuguese'},
  {code:'ru',name:'Русский',style:'russian'},
  {code:'ar',name:'العربية',style:'arabic'},
  {code:'ja',name:'日本語',style:'japanese'},
  {code:'zh',name:'中文',style:'chinese'},
  {code:'la',name:'Lingua Latina',style:'latin'},
  {code:'qya',name:'Quenya',style:'elvish',fictional:true},
  {code:'tlh',name:'Klingon',style:'klingon',fictional:true},
  {code:'brg',name:'Borgesiano',style:'borgesiano',fictional:true},
];
const authors={
  hispanic:['Jorge Medina','Elena Vargas','Carlos Fuentes','Isabel Ríos'],
  english:['Arthur Pemberton','Eleanor Marsh','Thomas Whitfield','Clara Holt'],
  french:['Étienne Moreau','Céleste Dupont','Armand Lefèvre','Marguerite Vidal'],
  german:['Friedrich Kellner','Ingrid Schäfer','Wolfgang Braun','Hildegard Müller'],
  italian:['Lorenzo Ferretti','Giovanna Esposito','Marco Ricci','Chiara Fontana'],
  portuguese:['António Figueiredo','Beatriz Sousa','Rui Carvalho','Inês Monteiro'],
  russian:['Алексей Соколов','Наталья Волкова','Дмитрий Козлов','Ирина Морозова'],
  arabic:['عمر الفاروق','ليلى النجار','محمد الشرقي','فاطمة الزهراء'],
  japanese:['中村 哲也','山田 美咲','田中 修一','佐藤 葉子'],
  chinese:['陈志远','李月华','王明道','林秀英'],
  latin:['Marcus Aurelius Vindex','Gaius Pontifex','Lucia Cornelia','Quintus Fabianus'],
  elvish:['Galadriel Celeborn','Ithildin Anarion','Eärwen Noldorin'],
  klingon:['Qa\'vIn HoD','toH\'vor vestai','K\'mpec sutai'],
  borgesiano:['ꞧ꙳ℵ Ωmδ','⌖ℒ꙰ Δσφ','Σ∇ℵ꙱ Ψ̈'],
};
function pickLang(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffffffff;return langs[Math.abs(h)%langs.length];}
function pickAuthor(style,s){const p=authors[style]||authors.hispanic;let h=0;for(let i=0;i<s.length;i++)h=(h*17+s.charCodeAt(i))&0xffffffff;return p[Math.abs(h)%p.length];}

function makeCoords(s){let h=0x811c9dc5;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193)>>>0;}
  return{sala:(h%999983)+1,piso:((h>>8)%40)-20,vol:((h>>20)%32)+1,pag:((h>>24)%410)+1};}
function fmtC(c){return`sala ${String(c.sala).padStart(6,'0')} · piso ${c.piso>=0?'+'+c.piso:c.piso} · vol.${c.vol} · pág.${c.pag}`;}

const narLines=[
  c=>`He recorrido estas galerías durante noches innumerables para encontrarte. La sala ${String(c.sala).padStart(6,'0')}, piso ${c.piso>=0?'+'+c.piso:c.piso}. Aquí existe lo que buscas.`,
  c=>`En el volumen ${c.vol}, página ${c.pag}. Hay algo que siempre estuvo esperando ser leído. La biblioteca no crea. Contiene.`,
  c=>`Lo que encontrarás nunca fue escrito. Siempre existió. Sala ${String(c.sala).padStart(6,'0')}.`,
];
const lmsgs=[
  'El bibliotecario recorre las galerías…',
  'Consultando el catálogo de catálogos…',
  'La obra siempre existió. Solo falta encontrarla…',
  'Descifrado el idioma samoyedo-lituano del guaraní…',
  'Atravesando el hexágono carmesí…',
  'Traducciones desde lenguas extintas…',
];
const genreMap={
  cuento:'un cuento de entre 400 y 520 palabras con principio, nudo y desenlace',
  poema:'un poema de entre 20 y 30 versos en estrofas, con ritmo interior deliberado',
  ensayo:'un ensayo de entre 380 y 480 palabras, filosófico y concreto',
  enciclopedia:'una entrada enciclopédica de 300–400 palabras de una civilización desconocida',
  fragmento:'el fragmento inicial de una novela (400–500 palabras) con mundo, personaje y tensión sin resolver',
  carta:'una carta de 280–400 palabras entre dos personajes ficticios que revele algo irreversible',
  diario:'una entrada de diario íntima (280–400 palabras) en primera persona, con fecha inventada',
};

async function fetchGutenberg(tema){
  try{
    const res=await fetch(`https://gutendex.com/books/?search=${encodeURIComponent(tema)}&mime_type=text/plain`);
    const data=await res.json();if(!data.results?.length)return null;
    const book=data.results[Math.floor(Math.random()*Math.min(4,data.results.length))];
    const url=Object.values(book.formats||{}).find(u=>u.includes('plain')&&!u.includes('zip'));
    if(!url)return null;
    const tr=await fetch(url);const full=await tr.text();
    const clean=full.replace(/^[\s\S]{0,3000}?\*\*\*/,'').replace(/\r\n/g,'\n').trim();
    const words=clean.split(/\s+/);const start=Math.floor(words.length*0.2);
    return{title:book.title,author:book.authors?.[0]?.name||'Anónimo',
      lang:book.languages?.[0]||'en',passage:words.slice(start,start+300).join(' '),isReal:true};
  }catch(e){return null;}
}

async function callGroq(prompt){
  try{
    const res=await fetch('/.netlify/functions/generate',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({tema:'',genre:'',prompt}),
    });
    const data=await res.json();return data.text||null;
  }catch(e){return null;}
}

// ── MAIN SEEK ──
async function seekBook(tema,wander){
  const actualTema=wander?topics[Math.floor(Math.random()*topics.length)]:tema;
  const seed=actualTema+genre+Math.random();
  const coords=makeCoords(seed);
  const lang=pickLang(seed);
  const author=pickAuthor(lang.style,seed+'a');

  // Narrator
  const line=narLines[Math.floor(Math.random()*narLines.length)](coords);
  const ntEl=document.getElementById('narr-text');ntEl.textContent='';
  document.getElementById('narr-coords').textContent='';
  document.getElementById('narr').classList.add('on');
  let ni=0;
  const ti=setInterval(()=>{if(ni<line.length){ntEl.textContent+=line[ni++];}else clearInterval(ti);},30);
  await delay(3500);
  document.getElementById('narr').classList.remove('on');

  // Loading
  document.getElementById('loading').classList.add('on');
  let lmi=0;const lEl=document.getElementById('load-msg');
  const lInt=setInterval(()=>{lmi=(lmi+1)%lmsgs.length;lEl.textContent=lmsgs[lmi];},1800);

  let title='',body='',translText='',authorText=author,langName=lang.name,sourceLabel='',isReal=false;

  if(Math.random()<0.4){
    const gb=await fetchGutenberg(actualTema);
    if(gb){
      isReal=true;title=gb.title;authorText=gb.author;
      langName=gb.lang.toUpperCase();body=gb.passage;
      sourceLabel='Proyecto Gutenberg · dominio público';
      const tp=`Traduce al español de forma literaria y fluida este fragmento. Solo la traducción, sin explicaciones:\n\n${gb.passage.slice(0,1000)}`;
      translText=await callGroq(tp)||'';
    }
  }

  if(!isReal){
    const isFict=lang.fictional;
    const langInstr=isFict
      ?`Escribe en ${lang.name}. Si es Borgesiano, inventa símbolos consistentes y bellos. Incluye traducción al español separada por la línea exacta: — Traducción —`
      :lang.code==='es'?'Escribe en español.'
      :`Escribe en ${lang.name}. Incluye traducción al español separada por la línea exacta: — Traducción —`;
    const instruction=genreMap[genre]||genreMap.cuento;
    const prompt=`Eres un escritor de la Biblioteca de Babel. Tu nombre de autor es ${author}.
REGLAS ABSOLUTAS: Primera línea: solo el título. Línea en blanco. Texto. ${langInstr}
Sin introducciones, sin firmas, sin explicaciones fuera de la obra.
La persona busca: "${actualTema}"
Escribe ${instruction} sobre este tema.`;
    const raw=await callGroq(prompt)||`Sin título\n\n[La obra se perdió entre las galerías.]`;
    const parts=raw.split(/—\s*Traducción\s*—/i);
    const orig=parts[0].trim();const oLines=orig.split('\n');
    title=oLines[0];body=oLines.slice(1).join('\n').replace(/^\n+/,'').trim();
    translText=parts[1]?.trim()||'';
    sourceLabel='Siempre existió en esta biblioteca';
  }

  clearInterval(lInt);
  document.getElementById('loading').classList.remove('on');

  // Populate
  document.getElementById('bd-eyebrow').textContent=sourceLabel;
  document.getElementById('bd-title').textContent=title;
  document.getElementById('bd-meta').innerHTML=
    `<span class="bd-tag">${langName}</span><span class="bd-tag">${genre}</span>
     <span class="bd-tag">${Math.ceil(body.split(' ').length/200)} min lectura</span>`;
  document.getElementById('bd-author-line').textContent=authorText;
  document.getElementById('bd-coords').textContent=fmtC(coords);
  document.getElementById('bd-text').textContent=body;
  document.getElementById('book-display').scrollTop=0;
  document.getElementById('bd-body').scrollTop=0;

  const transBlock=document.getElementById('bd-trans-block');
  if(translText){
    transBlock.style.display='block';
    document.getElementById('bd-translation').textContent=translText;
  } else {
    transBlock.style.display='none';
  }

  document.getElementById('book-display').classList.add('on');
}

// ── GLOW BOOKS ──
function glowBook(){
  document.querySelectorAll('.book.glow').forEach(b=>b.classList.remove('glow'));
  const bs=document.querySelectorAll('.book.clickable');
  if(bs.length){bs[Math.floor(Math.random()*bs.length)].classList.add('glow');}
}
setInterval(glowBook,3500);setTimeout(glowBook,1500);

// ── QUOTES ──
const quotes=[
  '"La Biblioteca es una esfera cuyo centro cabal es cualquier hexágono, cuya circunferencia es inaccesible."',
  '"Todo: la historia minuciosa del porvenir, las autobiografías de los arcángeles."',
  '"La certidumbre de que todo está escrito nos anula o nos afantasma."',
  '"Nadie puede articular una sílaba que no esté llena de ternuras y de temores."',
  '"La Biblioteca es ilimitada y periódica."',
];
let qi=0;
const fqp=document.getElementById('fqp');
setTimeout(()=>{fqp.textContent=quotes[0];fqp.classList.add('vis');},3000);
setInterval(()=>{
  fqp.classList.remove('vis');
  setTimeout(()=>{qi=(qi+1)%quotes.length;fqp.textContent=quotes[qi];fqp.classList.add('vis');},1200);
},10000);

function delay(ms){return new Promise(r=>setTimeout(r,ms));}
</script>
