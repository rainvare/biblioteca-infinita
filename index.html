<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Biblioteca de Babel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.5.0/aframe.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;
  font-family:'Space Grotesk',sans-serif;}

/* Hide A-Frame default UI */
.a-enter-vr-button,.a-orientation-modal{display:none!important;}
canvas{display:block;}

/* ── OVERLAY UI ── */
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;}

/* TOP */
#topbar{position:absolute;top:0;left:0;right:0;padding:16px 20px 20px;
  background:linear-gradient(to bottom,rgba(240,248,255,0.92) 0%,transparent 100%);
  text-align:center;pointer-events:none;}
#topbar h1{font-family:'Cinzel',serif;font-size:clamp(1rem,3vw,1.5rem);
  color:#0d1117;letter-spacing:0.14em;font-weight:400;}
#topbar p{font-family:'Cormorant',serif;font-style:italic;
  font-size:0.7rem;color:#8896a8;letter-spacing:0.2em;margin-top:2px;}

/* HINT */
#hint{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);
  pointer-events:none;text-align:center;
  animation:fadeUp 2s 2s both;}
#hint p{font-family:'Cormorant',serif;font-style:italic;
  font-size:0.82rem;color:#4a5568;
  background:rgba(255,255,255,0.85);padding:8px 20px;border-radius:20px;
  border:1px solid rgba(0,180,255,0.2);backdrop-filter:blur(8px);}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px);}
  to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* CROSSHAIR */
#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;width:20px;height:20px;}
#xhair::before,#xhair::after{content:'';position:absolute;
  background:rgba(0,180,255,0.5);border-radius:1px;}
#xhair::before{width:1px;height:100%;left:50%;transform:translateX(-50%);}
#xhair::after{width:100%;height:1px;top:50%;transform:translateY(-50%);}

/* GAZE RING — shows on hover */
#gaze{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;width:40px;height:40px;border-radius:50%;
  border:2px solid rgba(0,180,255,0.6);opacity:0;transition:opacity 0.3s;
  animation:gazeRing 1.2s ease infinite;}
#gaze.active{opacity:1;}
@keyframes gazeRing{0%,100%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.2);}}

/* PROGRESS BAR */
#prog{position:absolute;top:0;left:0;height:2px;
  background:linear-gradient(90deg,#00c8ff,#7b5cfa);
  transition:width 0.3s;box-shadow:0 0 6px rgba(0,200,255,0.5);}

/* ── MODAL ── */
#modal{position:fixed;inset:0;z-index:50;display:flex;
  align-items:flex-end;justify-content:center;
  background:rgba(220,235,255,0.5);backdrop-filter:blur(16px);
  opacity:0;pointer-events:none;transition:opacity 0.4s;}
#modal.on{opacity:1;pointer-events:all;}
#modal-sheet{width:100%;max-width:540px;
  background:rgba(255,255,255,0.97);
  border-radius:20px 20px 0 0;
  border-top:1px solid rgba(0,180,255,0.2);
  padding:20px 22px 36px;
  box-shadow:0 -20px 60px rgba(0,150,255,0.12);
  transform:translateY(100%);
  transition:transform 0.42s cubic-bezier(0.25,0.46,0.45,0.94);}
#modal.on #modal-sheet{transform:translateY(0);}
.handle{width:36px;height:4px;border-radius:2px;
  background:rgba(0,180,255,0.2);margin:0 auto 18px;}
.meyebrow{font-size:0.65rem;color:#8896a8;letter-spacing:0.2em;
  text-transform:uppercase;text-align:center;margin-bottom:4px;font-weight:500;}
.mtitle{font-family:'Cinzel',serif;font-size:1.2rem;color:#0d1117;
  text-align:center;margin-bottom:3px;letter-spacing:0.06em;font-weight:400;}
.msub{font-family:'Cormorant',serif;font-style:italic;font-size:0.78rem;
  color:#8896a8;text-align:center;margin-bottom:16px;}
.mrule{height:1px;background:linear-gradient(90deg,transparent,rgba(0,180,255,0.2),transparent);
  margin-bottom:16px;}
.mlabel{font-size:0.68rem;color:#8896a8;letter-spacing:0.14em;
  text-transform:uppercase;display:block;margin-bottom:8px;font-weight:500;}
#mq{width:100%;background:#f5f7fa;border:1.5px solid rgba(0,180,255,0.18);
  border-radius:12px;color:#0d1117;font-family:'Cormorant',serif;
  font-style:italic;font-size:1.05rem;padding:12px 16px;text-align:center;
  outline:none;transition:border-color 0.3s,box-shadow 0.3s;}
#mq::placeholder{color:#8896a8;}
#mq:focus{border-color:rgba(0,180,255,0.4);
  box-shadow:0 0 0 3px rgba(0,180,255,0.08);}
.mgr{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px 0;}
.mpill{font-size:0.72rem;color:#4a5568;border:1.5px solid rgba(0,150,200,0.15);
  border-radius:20px;padding:5px 13px;cursor:pointer;transition:all 0.2s;
  background:#f5f7fa;font-weight:500;}
.mpill.on{color:#0a84ff;border-color:rgba(0,150,255,0.4);
  background:rgba(0,180,255,0.06);}
.mactions{display:flex;gap:10px;margin-top:16px;}
.mact{flex:1;font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.14em;
  border-radius:12px;padding:13px;cursor:pointer;transition:all 0.25s;text-align:center;}
.mact.sec{color:#0a84ff;background:rgba(0,180,255,0.06);
  border:1.5px solid rgba(0,180,255,0.22);}
.mact.pri{color:#fff;background:#0a84ff;border:1.5px solid #0a84ff;}
.mact.pri:hover{background:#0070e0;}
.mact:active{transform:scale(0.97);}
#mclose{position:absolute;top:14px;right:14px;width:28px;height:28px;
  border-radius:50%;background:#f5f7fa;border:1px solid rgba(0,180,255,0.15);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;color:#8896a8;transition:all 0.2s;}
#mclose:hover{color:#0a84ff;}

/* ── NARRATOR ── */
#narr{position:fixed;inset:0;z-index:48;display:flex;align-items:center;
  justify-content:center;padding:32px;
  background:rgba(240,248,255,0.9);backdrop-filter:blur(24px);
  opacity:0;pointer-events:none;transition:opacity 0.6s;}
#narr.on{opacity:1;}
#narr-inner{max-width:480px;text-align:center;}
.narr-icon{font-size:2.2rem;margin-bottom:18px;
  animation:pulse 2s ease infinite alternate;}
@keyframes pulse{from{opacity:0.6;transform:scale(1);}to{opacity:1;transform:scale(1.08);}}
#narr-text{font-family:'Cormorant',serif;font-style:italic;
  font-size:clamp(1rem,2.5vw,1.25rem);color:#0d1117;line-height:2.1;}
#narr-coords{font-size:0.65rem;color:#8896a8;letter-spacing:0.14em;
  margin-top:14px;font-weight:500;}

/* ── LOADING ── */
#loading{position:fixed;inset:0;z-index:49;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
  background:rgba(240,248,255,0.94);backdrop-filter:blur(24px);
  opacity:0;pointer-events:none;transition:opacity 0.4s;}
#loading.on{opacity:1;pointer-events:all;}
.lring{width:52px;height:52px;border-radius:50%;
  border:3px solid rgba(0,180,255,0.12);border-top:3px solid #00c8ff;
  animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#lmsg{font-family:'Cormorant',serif;font-style:italic;
  font-size:1rem;color:#4a5568;max-width:280px;text-align:center;line-height:1.9;
  animation:breathe 2.5s ease infinite;}
@keyframes breathe{0%,100%{opacity:0.45;}50%{opacity:1;}}
.lbar{width:180px;height:2px;background:rgba(0,180,255,0.1);border-radius:1px;overflow:hidden;}
.lfill{height:100%;background:linear-gradient(90deg,#00c8ff,#7b5cfa);border-radius:1px;
  animation:lfill 2s ease infinite;}
@keyframes lfill{0%{width:0;margin-left:0;}50%{width:100%;margin-left:0;}
  100%{width:0;margin-left:100%;}}

/* ── BOOK DISPLAY ── */
#bookview{position:fixed;inset:0;z-index:50;
  background:#f8fcff;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity 0.5s;}
#bookview.on{opacity:1;pointer-events:all;}
#bv-hdr{flex-shrink:0;padding:18px 20px 14px;
  background:#fff;border-bottom:1px solid rgba(0,180,255,0.1);}
#bv-eyebrow{font-size:0.6rem;color:#8896a8;letter-spacing:0.2em;
  text-transform:uppercase;font-weight:500;margin-bottom:4px;}
#bv-title{font-family:'Cinzel',serif;font-size:clamp(1rem,3vw,1.5rem);
  color:#0d1117;line-height:1.3;font-weight:400;letter-spacing:0.04em;margin-bottom:8px;}
#bv-meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px;}
.bv-tag{font-size:0.6rem;color:#0a84ff;letter-spacing:0.1em;
  border:1px solid rgba(0,150,255,0.22);border-radius:20px;
  padding:3px 11px;background:rgba(0,180,255,0.05);font-weight:500;}
#bv-author{font-family:'Cormorant',serif;font-style:italic;
  font-size:0.8rem;color:#4a5568;}
#bv-body{flex:1;overflow-y:auto;padding:24px 20px;
  -webkit-overflow-scrolling:touch;}
#bv-body::-webkit-scrollbar{width:3px;}
#bv-body::-webkit-scrollbar-thumb{background:rgba(0,180,255,0.2);border-radius:2px;}
#bv-text{font-family:'Cormorant',serif;font-size:clamp(1rem,2.2vw,1.1rem);
  color:#1a2030;line-height:2.1;white-space:pre-wrap;letter-spacing:0.01em;}
.tdivider{display:flex;align-items:center;gap:12px;margin:24px 0 18px;}
.tdivider::before,.tdivider::after{content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,180,255,0.2),transparent);}
.tlabel{font-size:0.62rem;color:#8896a8;letter-spacing:0.18em;
  text-transform:uppercase;font-weight:500;white-space:nowrap;}
#bv-trans{font-family:'Cormorant',serif;font-style:italic;
  font-size:clamp(0.9rem,2vw,1rem);color:#4a5568;line-height:2;white-space:pre-wrap;}
#bv-ftr{flex-shrink:0;padding:12px 20px 24px;background:#fff;
  border-top:1px solid rgba(0,180,255,0.08);}
#bv-coords{font-size:0.6rem;color:#8896a8;letter-spacing:0.1em;
  text-align:center;margin-bottom:10px;font-weight:500;}
.bv-actions{display:flex;gap:8px;}
.bv-btn{flex:1;font-family:'Cinzel',serif;font-size:0.58rem;
  letter-spacing:0.12em;padding:12px;border-radius:12px;cursor:pointer;
  transition:all 0.22s;text-align:center;}
.bv-btn.sec{color:#0a84ff;background:rgba(0,180,255,0.06);
  border:1.5px solid rgba(0,180,255,0.2);}
.bv-btn.pri{color:#fff;background:#0a84ff;border:1.5px solid #0a84ff;}
.bv-btn:active{transform:scale(0.97);}

/* FLOAT QUOTE */
#fquote{position:fixed;bottom:14px;right:14px;z-index:9;pointer-events:none;
  max-width:210px;text-align:right;}
#fquote p{font-family:'Cormorant',serif;font-style:italic;font-size:0.64rem;
  color:#4a5568;line-height:1.75;
  background:rgba(255,255,255,0.85);padding:8px 12px;border-radius:10px;
  border:1px solid rgba(0,180,255,0.15);backdrop-filter:blur(8px);
  opacity:0;transition:opacity 1.2s;}
#fquote p.vis{opacity:1;}
</style>
</head>
<body>

<!-- ── A-FRAME SCENE ── -->
<a-scene
  renderer="antialias:true;colorManagement:true;"
  background="color:#e8f2ff"
  vr-mode-ui="enabled:false"
  loading-screen="enabled:false"
  id="scene">

  <a-assets>
    <!-- Procedural canvas textures -->
    <canvas id="tex-floor" width="512" height="512" style="display:none"></canvas>
    <canvas id="tex-wall" width="256" height="512" style="display:none"></canvas>
    <canvas id="tex-ceil" width="512" height="512" style="display:none"></canvas>
  </a-assets>

  <!-- CAMERA RIG (mobile touch look) -->
  <a-entity id="rig" position="0 1.6 0">
    <a-camera
      id="cam"
      look-controls="magicWindowTrackingEnabled:false;touchEnabled:false"
      wasd-controls="enabled:false"
      fov="75">
      <!-- Gaze cursor for desktop -->
      <a-cursor
        color="#00c8ff"
        opacity="0.6"
        raycaster="objects:.book3d"
        fuse="false"
        scale="0.5 0.5 0.5">
      </a-cursor>
    </a-camera>
  </a-entity>

  <!-- CORRIDOR CONTAINER -->
  <a-entity id="corridor-root" position="0 0 0"></a-entity>

  <!-- AMBIENT + DIRECTIONAL LIGHT -->
  <a-light type="ambient" color="#ddeeff" intensity="0.9"></a-light>
  <a-light type="directional" color="#ffffff" intensity="0.6"
    position="0 5 -5"></a-light>
  <!-- Colored point lights for atmosphere -->
  <a-light type="point" color="#00c8ff" intensity="0.4" distance="15"
    position="0 2 -8" id="pl1"></a-light>
  <a-light type="point" color="#7b5cfa" intensity="0.3" distance="12"
    position="0 2 -20" id="pl2"></a-light>

</a-scene>

<!-- ── UI LAYER ── -->
<div id="ui">
  <div id="topbar">
    <h1>La Biblioteca de Babel</h1>
    <p>jorge luis borges · 1941</p>
  </div>
  <div id="prog" style="width:0%"></div>
  <div id="xhair"></div>
  <div id="gaze"></div>
  <div id="hint"><p>desliza para avanzar · toca un libro</p></div>
  <div id="fquote"><p id="fqp"></p></div>
</div>

<!-- MODAL -->
<div id="modal">
  <div id="modal-sheet" style="position:relative">
    <div class="handle"></div>
    <button id="mclose">✕</button>
    <p class="meyebrow">El bibliotecario</p>
    <div class="mtitle">La Biblioteca de Babel</div>
    <p class="msub">Todo lo que puede ser escrito ya existe en estas salas</p>
    <div class="mrule"></div>
    <label class="mlabel">¿Qué busca el viajero?</label>
    <input type="text" id="mq" placeholder="el nombre de lo que se perdió…"
      autocomplete="off" spellcheck="false"/>
    <div class="mgr" id="mgr">
      <button class="mpill on" data-g="cuento">Cuento</button>
      <button class="mpill" data-g="poema">Poema</button>
      <button class="mpill" data-g="ensayo">Ensayo</button>
      <button class="mpill" data-g="enciclopedia">Enciclopedia</button>
      <button class="mpill" data-g="fragmento">Fragmento</button>
      <button class="mpill" data-g="carta">Carta</button>
      <button class="mpill" data-g="diario">Diario</button>
    </div>
    <div class="mactions">
      <button class="mact sec" id="mbtn-wander">◌ Dejarme perder</button>
      <button class="mact pri" id="mbtn-seek">✦ Buscar</button>
    </div>
  </div>
</div>

<!-- NARRATOR -->
<div id="narr">
  <div id="narr-inner">
    <div class="narr-icon">◈</div>
    <p id="narr-text"></p>
    <p id="narr-coords"></p>
  </div>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="lring"></div>
  <p id="lmsg">El bibliotecario recorre las galerías…</p>
  <div class="lbar"><div class="lfill"></div></div>
</div>

<!-- BOOK VIEW -->
<div id="bookview">
  <div id="bv-hdr">
    <div id="bv-eyebrow"></div>
    <div id="bv-title"></div>
    <div id="bv-meta"></div>
    <div id="bv-author"></div>
  </div>
  <div id="bv-body">
    <div id="bv-text"></div>
    <div id="bv-trans-block" style="display:none">
      <div class="tdivider"><span class="tlabel">Traducción al español</span></div>
      <div id="bv-trans"></div>
    </div>
  </div>
  <div id="bv-ftr">
    <div id="bv-coords"></div>
    <div class="bv-actions">
      <button class="bv-btn sec" id="bv-back">← Volver</button>
      <button class="bv-btn pri" id="bv-new">◌ Nueva obra</button>
    </div>
  </div>
</div>

<script>
// ── TEXTURES ──
function makeFloorTex(){
  const c=document.getElementById('tex-floor'),ctx=c.getContext('2d');
  ctx.fillStyle='#dde8f5';ctx.fillRect(0,0,512,512);
  ctx.strokeStyle='rgba(0,150,220,0.15)';ctx.lineWidth=1;
  for(let i=0;i<=8;i++){
    ctx.beginPath();ctx.moveTo(i*64,0);ctx.lineTo(i*64,512);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*64);ctx.lineTo(512,i*64);ctx.stroke();
  }
  return c;
}
function makeWallTex(){
  const c=document.getElementById('tex-wall'),ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,0,256,0);
  g.addColorStop(0,'#c8ddf5');g.addColorStop(1,'#ddeeff');
  ctx.fillStyle=g;ctx.fillRect(0,0,256,512);
  return c;
}
function makeCeilTex(){
  const c=document.getElementById('tex-ceil'),ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,512,0,0);
  g.addColorStop(0,'#d0e8ff');g.addColorStop(1,'#eef4ff');
  ctx.fillStyle=g;ctx.fillRect(0,0,512,512);
  return c;
}
makeFloorTex();makeWallTex();makeCeilTex();

// ── BOOK COLORS ──
const bkColors=[
  '#4a90d9','#7b5cfa','#00a8cc','#e8624a','#f0a030',
  '#5aab6e','#c060d8','#3d85c8','#e06090','#60c0a0',
  '#8060e0','#50b8e8','#d08040','#6080d0','#a050c0',
];

// ── CORRIDOR SEGMENTS ──
const corridorRoot=document.getElementById('corridor-root');
const SEG_LEN=12;const NUM_SEGS=8;
const CORRIDOR_W=5;const CORRIDOR_H=4;
let segments3d=[];let camPosZ=0;let targetPosZ=0;

function makeBook(x,y,z,rx,color,segEl,isClickable){
  const w=0.08+Math.random()*0.12;
  const h=0.4+Math.random()*0.35;
  const d=0.6;
  const book=document.createElement('a-box');
  book.setAttribute('position',`${x} ${y} ${z}`);
  book.setAttribute('rotation',`0 ${rx} 0`);
  book.setAttribute('width',w);book.setAttribute('height',h);book.setAttribute('depth',d);
  book.setAttribute('color',color);
  book.setAttribute('roughness','0.7');book.setAttribute('metalness','0.1');
  // Spine color slightly lighter
  book.setAttribute('material',`color:${color};roughness:0.7;metalness:0.05`);
  if(isClickable){
    book.classList.add('book3d');
    book.setAttribute('data-clickable','true');
    book.addEventListener('click',()=>openModal());
  }
  segEl.appendChild(book);
}

function makeShelfUnit(side,segZ,segEl,clickable){
  const sx=side==='left'?-(CORRIDOR_W/2+0.05):(CORRIDOR_W/2+0.05);
  const rx=side==='left'?90:-90;
  const shelfCount=5;
  for(let s=0;s<shelfCount;s++){
    const sy=0.4+s*0.7;
    // Shelf plank
    const plank=document.createElement('a-box');
    plank.setAttribute('position',`${sx} ${sy} ${segZ}`);
    plank.setAttribute('width',0.05);plank.setAttribute('height',0.04);
    plank.setAttribute('depth',SEG_LEN);
    plank.setAttribute('color','#b8d0e8');
    plank.setAttribute('roughness','0.8');
    segEl.appendChild(plank);
    // Books on shelf
    const n=6+Math.floor(Math.random()*8);
    for(let b=0;b<n;b++){
      const bz=segZ-SEG_LEN/2+1+b*(SEG_LEN-2)/n+(Math.random()*0.1-0.05);
      const col=bkColors[Math.floor(Math.random()*bkColors.length)];
      makeBook(sx,sy+0.25,bz,rx,col,segEl,clickable&&s===2&&b<3);
    }
  }
  // Wall panel
  const wall=document.createElement('a-plane');
  wall.setAttribute('position',`${sx} ${CORRIDOR_H/2} ${segZ}`);
  wall.setAttribute('rotation',`0 ${side==='left'?-90:90} 0`);
  wall.setAttribute('width',SEG_LEN);wall.setAttribute('height',CORRIDOR_H);
  wall.setAttribute('color','#ddeeff');wall.setAttribute('roughness','0.9');
  segEl.appendChild(wall);
}

function makeSeg(index){
  const segEl=document.createElement('a-entity');
  const segZ=-(index*SEG_LEN);
  segEl.setAttribute('position',`0 0 ${segZ}`);

  // Floor
  const floor=document.createElement('a-plane');
  floor.setAttribute('rotation','-90 0 0');
  floor.setAttribute('width',CORRIDOR_W);floor.setAttribute('height',SEG_LEN);
  floor.setAttribute('color','#ccddf0');floor.setAttribute('roughness','0.8');
  floor.setAttribute('src','#tex-floor');
  segEl.appendChild(floor);

  // Ceiling
  const ceil=document.createElement('a-plane');
  ceil.setAttribute('position',`0 ${CORRIDOR_H} 0`);
  ceil.setAttribute('rotation','90 0 0');
  ceil.setAttribute('width',CORRIDOR_W);ceil.setAttribute('height',SEG_LEN);
  ceil.setAttribute('color','#ddeeff');ceil.setAttribute('roughness','0.9');
  segEl.appendChild(ceil);

  // Shelves both sides — first 2 segs clickable
  const clickable=index<=1;
  makeShelfUnit('left',0,segEl,clickable);
  makeShelfUnit('right',0,segEl,clickable);

  // Ceiling lamp strip
  const lamp=document.createElement('a-box');
  lamp.setAttribute('position',`0 ${CORRIDOR_H-0.05} 0`);
  lamp.setAttribute('width',0.2);lamp.setAttribute('height',0.05);
  lamp.setAttribute('depth',SEG_LEN);
  lamp.setAttribute('color','#ffffff');lamp.setAttribute('emissive','#aaddff');
  lamp.setAttribute('emissiveIntensity','0.6');
  segEl.appendChild(lamp);

  // Hologram pillar (every other segment)
  if(index%2===0){
    const holo=document.createElement('a-cylinder');
    holo.setAttribute('position',`0 ${CORRIDOR_H/2} 0`);
    holo.setAttribute('radius','0.03');holo.setAttribute('height',CORRIDOR_H);
    holo.setAttribute('color','#00c8ff');holo.setAttribute('opacity','0.3');
    holo.setAttribute('emissive','#00c8ff');holo.setAttribute('emissiveIntensity','0.8');
    segEl.appendChild(holo);
  }

  corridorRoot.appendChild(segEl);
  return{el:segEl,baseZ:segZ,index};
}

// Wait for A-Frame to be ready
document.getElementById('scene').addEventListener('loaded',()=>{
  for(let i=0;i<NUM_SEGS;i++) segments3d.push(makeSeg(i));
  startLoop();
});

// ── MOVEMENT ──
let hintHidden=false;
function advance(dz){
  targetPosZ-=dz;
  if(!hintHidden){
    document.getElementById('hint').style.opacity='0';
    hintHidden=true;
  }
  const pct=Math.abs(targetPosZ/(SEG_LEN*10))*100%100;
  document.getElementById('prog').style.width=pct+'%';
}

function startLoop(){
  const rig=document.getElementById('rig');
  const pl1=document.getElementById('pl1');
  const pl2=document.getElementById('pl2');

  function loop(){
    // Smooth camera
    camPosZ+=(targetPosZ-camPosZ)*0.07;
    rig.setAttribute('position',`0 1.6 ${camPosZ}`);

    // Recycle segments
    segments3d.forEach(seg=>{
      const worldZ=seg.baseZ+camPosZ;
      if(worldZ>SEG_LEN){
        // Move this segment far ahead
        const newBase=seg.baseZ-NUM_SEGS*SEG_LEN;
        seg.baseZ=newBase;
        seg.el.setAttribute('position',`0 0 ${newBase}`);
      }
    });

    // Move point lights with camera
    pl1.setAttribute('position',`1 2 ${camPosZ-8}`);
    pl2.setAttribute('position',`-1 2 ${camPosZ-20}`);

    requestAnimationFrame(loop);
  }
  loop();
}

// ── INPUT ──
let touchY0=0,touchX0=0;
let lookX=0,lookY=0;
let isDragging=false;

document.addEventListener('wheel',e=>{e.preventDefault();advance(e.deltaY*0.015);},{passive:false});

document.addEventListener('touchstart',e=>{
  if(document.getElementById('modal').classList.contains('on')) return;
  if(document.getElementById('bookview').classList.contains('on')) return;
  touchY0=e.touches[0].clientY;
  touchX0=e.touches[0].clientX;
  isDragging=false;
},{passive:true});

document.addEventListener('touchmove',e=>{
  if(document.getElementById('modal').classList.contains('on')) return;
  if(document.getElementById('bookview').classList.contains('on')) return;
  const dy=touchY0-e.touches[0].clientY;
  const dx=e.touches[0].clientX-touchX0;
  touchY0=e.touches[0].clientY;
  touchX0=e.touches[0].clientX;
  if(Math.abs(dy)>3) advance(dy*0.06);
  if(Math.abs(dx)>2){
    // Look left/right by rotating camera
    const cam=document.getElementById('cam');
    lookX-=dx*0.15;
    lookX=Math.max(-60,Math.min(60,lookX));
    cam.setAttribute('rotation',`${lookY} ${lookX} 0`);
  }
  isDragging=true;
},{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp'||e.key==='w') advance(0.5);
  if(e.key==='ArrowDown'||e.key==='s') advance(-0.5);
  if(e.key==='Escape') closeAll();
});

// ── MODAL ──
let genre='cuento';
function openModal(){document.getElementById('modal').classList.add('on');}
function closeModal(){document.getElementById('modal').classList.remove('on');}
document.getElementById('mclose').addEventListener('click',closeModal);
document.getElementById('modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal')) closeModal();
});
document.getElementById('mgr').querySelectorAll('.mpill').forEach(p=>{
  p.addEventListener('click',()=>{
    document.querySelectorAll('.mpill').forEach(x=>x.classList.remove('on'));
    p.classList.add('on');genre=p.dataset.g;
  });
});
document.getElementById('mbtn-seek').addEventListener('click',()=>{
  const v=document.getElementById('mq').value.trim();
  if(!v){document.getElementById('mq').focus();return;}
  closeModal();seekBook(v,false);
});
document.getElementById('mbtn-wander').addEventListener('click',()=>{
  closeModal();seekBook('',true);
});
document.getElementById('mq').addEventListener('keydown',e=>{
  if(e.key==='Enter') document.getElementById('mbtn-seek').click();
});
document.getElementById('bv-back').addEventListener('click',()=>{
  document.getElementById('bookview').classList.remove('on');
});
document.getElementById('bv-new').addEventListener('click',()=>{
  document.getElementById('bookview').classList.remove('on');
  openModal();
});
function closeAll(){
  closeModal();
  document.getElementById('narr').classList.remove('on');
  document.getElementById('loading').classList.remove('on');
  document.getElementById('bookview').classList.remove('on');
}

// ── DATA ──
const topics=[
  'el último ser humano en recordar el color azul',
  'una carta que atravesó el tiempo sin llegar',
  'la ciudad que soñaron y nunca construyeron',
  'el momento en que alguien decidió olvidar',
  'el animal que guarda el nombre secreto del universo',
  'la conversación entre dos estrellas que agonizaban',
  'una memoria que pertenece a alguien que aún no nació',
  'el nombre que un dios olvidó pronunciar',
];
const langs=[
  {code:'es',name:'Español',style:'hispanic'},
  {code:'en',name:'English',style:'english'},
  {code:'fr',name:'Français',style:'french'},
  {code:'de',name:'Deutsch',style:'german'},
  {code:'it',name:'Italiano',style:'italian'},
  {code:'pt',name:'Português',style:'portuguese'},
  {code:'ru',name:'Русский',style:'russian'},
  {code:'ja',name:'日本語',style:'japanese'},
  {code:'la',name:'Lingua Latina',style:'latin'},
  {code:'qya',name:'Quenya',style:'elvish',fictional:true},
  {code:'brg',name:'Borgesiano',style:'borgesiano',fictional:true},
];
const authors={
  hispanic:['Jorge Medina','Elena Vargas','Carlos Fuentes','Isabel Ríos'],
  english:['Arthur Pemberton','Eleanor Marsh','Thomas Whitfield','Clara Holt'],
  french:['Étienne Moreau','Céleste Dupont','Armand Lefèvre'],
  german:['Friedrich Kellner','Ingrid Schäfer','Wolfgang Braun'],
  italian:['Lorenzo Ferretti','Giovanna Esposito','Marco Ricci'],
  portuguese:['António Figueiredo','Beatriz Sousa','Rui Carvalho'],
  russian:['Алексей Соколов','Наталья Волкова','Дмитрий Козлов'],
  japanese:['中村 哲也','山田 美咲','田中 修一'],
  latin:['Marcus Aurelius Vindex','Gaius Pontifex','Lucia Cornelia'],
  elvish:['Galadriel Celeborn','Ithildin Anarion','Eärwen Noldorin'],
  borgesiano:['ꞧ꙳ℵ Ωmδ','⌖ℒ꙰ Δσφ','Σ∇ℵ꙱ Ψ̈'],
};
function pickLang(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffffffff;return langs[Math.abs(h)%langs.length];}
function pickAuthor(st,s){const p=authors[st]||authors.hispanic;let h=0;for(let i=0;i<s.length;i++)h=(h*17+s.charCodeAt(i))&0xffffffff;return p[Math.abs(h)%p.length];}
function makeCoords(s){let h=0x811c9dc5;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193)>>>0;}
  return{sala:(h%999983)+1,piso:((h>>8)%40)-20,vol:((h>>20)%32)+1,pag:((h>>24)%410)+1};}
function fmtC(c){return`sala ${String(c.sala).padStart(6,'0')} · piso ${c.piso>=0?'+'+c.piso:c.piso} · vol.${c.vol} · pág.${c.pag}`;}

const narLines=[
  c=>`He recorrido estas galerías durante noches innumerables para encontrarte. La sala ${String(c.sala).padStart(6,'0')}, piso ${c.piso>=0?'+'+c.piso:c.piso}. Aquí existe lo que buscas.`,
  c=>`En el volumen ${c.vol}, página ${c.pag}. Hay algo que siempre estuvo esperando ser leído. La biblioteca no crea. Contiene.`,
  c=>`Lo que encontrarás nunca fue escrito. Siempre existió. Sala ${String(c.sala).padStart(6,'0')}.`,
];
const lmsgs=['El bibliotecario recorre las galerías…','Consultando el catálogo de catálogos…','La obra siempre existió. Solo falta encontrarla…','Descifrado el idioma samoyedo-lituano del guaraní…','Atravesando el hexágono carmesí…'];
const genreMap={
  cuento:'un cuento de entre 400 y 520 palabras con principio, nudo y desenlace',
  poema:'un poema de entre 20 y 30 versos en estrofas, con ritmo interior deliberado',
  ensayo:'un ensayo de entre 380 y 480 palabras, filosófico y concreto',
  enciclopedia:'una entrada enciclopédica de 300–400 palabras de una civilización desconocida',
  fragmento:'el fragmento inicial de una novela (400–500 palabras) con mundo, personaje y tensión sin resolver',
  carta:'una carta de 280–400 palabras entre dos personajes ficticios que revele algo irreversible',
  diario:'una entrada de diario íntima (280–400 palabras) en primera persona, con fecha inventada',
};

async function fetchGutenberg(tema){
  try{
    const res=await fetch(`https://gutendex.com/books/?search=${encodeURIComponent(tema)}&mime_type=text/plain`);
    const data=await res.json();if(!data.results?.length)return null;
    const book=data.results[Math.floor(Math.random()*Math.min(4,data.results.length))];
    const url=Object.values(book.formats||{}).find(u=>u.includes('plain')&&!u.includes('zip'));
    if(!url)return null;
    const tr=await fetch(url);const full=await tr.text();
    const clean=full.replace(/^[\s\S]{0,3000}?\*\*\*/,'').replace(/\r\n/g,'\n').trim();
    const words=clean.split(/\s+/);const start=Math.floor(words.length*0.2);
    return{title:book.title,author:book.authors?.[0]?.name||'Anónimo',
      lang:book.languages?.[0]||'en',passage:words.slice(start,start+300).join(' '),isReal:true};
  }catch(e){return null;}
}
async function callGroq(prompt){
  try{
    const res=await fetch('/.netlify/functions/generate',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({tema:'',genre:'',prompt}),
    });
    const data=await res.json();return data.text||null;
  }catch(e){return null;}
}

async function seekBook(tema,wander){
  const actualTema=wander?topics[Math.floor(Math.random()*topics.length)]:tema;
  const seed=actualTema+genre+Math.random();
  const coords=makeCoords(seed);
  const lang=pickLang(seed);
  const author=pickAuthor(lang.style,seed+'a');

  // Narrator
  const line=narLines[Math.floor(Math.random()*narLines.length)](coords);
  const ntEl=document.getElementById('narr-text');ntEl.textContent='';
  document.getElementById('narr').classList.add('on');
  let ni=0;const ti=setInterval(()=>{if(ni<line.length)ntEl.textContent+=line[ni++];else clearInterval(ti);},30);
  await delay(3500);document.getElementById('narr').classList.remove('on');

  document.getElementById('loading').classList.add('on');
  let lmi=0;const lEl=document.getElementById('lmsg');
  const lInt=setInterval(()=>{lmi=(lmi+1)%lmsgs.length;lEl.textContent=lmsgs[lmi];},1800);

  let title='',body='',translText='',authorText=author,langName=lang.name,sourceLabel='',isReal=false;

  if(Math.random()<0.4){
    const gb=await fetchGutenberg(actualTema);
    if(gb){
      isReal=true;title=gb.title;authorText=gb.author;langName=gb.lang.toUpperCase();
      body=gb.passage;sourceLabel='Proyecto Gutenberg · dominio público';
      translText=await callGroq(`Traduce al español de forma literaria este fragmento. Solo la traducción:\n\n${gb.passage.slice(0,900)}`)||'';
    }
  }
  if(!isReal){
    const isFict=lang.fictional;
    const li=isFict
      ?`Escribe en ${lang.name}. Si es Borgesiano, inventa símbolos consistentes. Incluye traducción al español separada por: — Traducción —`
      :lang.code==='es'?'Escribe en español.'
      :`Escribe en ${lang.name}. Incluye traducción al español separada por: — Traducción —`;
    const raw=await callGroq(
      `Eres un escritor de la Biblioteca de Babel. Tu nombre de autor es ${author}.
REGLAS: Primera línea: título. Línea en blanco. Texto. ${li}
Sin introducciones ni firmas.
La persona busca: "${actualTema}"
Escribe ${genreMap[genre]||genreMap.cuento} sobre este tema.`
    )||`Sin título\n\n[La obra se perdió entre las galerías.]`;
    const parts=raw.split(/—\s*Traducción\s*—/i);
    const oLines=parts[0].trim().split('\n');
    title=oLines[0];body=oLines.slice(1).join('\n').replace(/^\n+/,'').trim();
    translText=parts[1]?.trim()||'';
    sourceLabel='Siempre existió en esta biblioteca';
  }

  clearInterval(lInt);document.getElementById('loading').classList.remove('on');

  document.getElementById('bv-eyebrow').textContent=sourceLabel;
  document.getElementById('bv-title').textContent=title;
  document.getElementById('bv-meta').innerHTML=
    `<span class="bv-tag">${langName}</span><span class="bv-tag">${genre}</span>
     <span class="bv-tag">${Math.ceil(body.split(' ').length/200)} min</span>`;
  document.getElementById('bv-author').textContent=authorText;
  document.getElementById('bv-coords').textContent=fmtC(coords);
  document.getElementById('bv-text').textContent=body;
  document.getElementById('bv-body').scrollTop=0;

  const tb=document.getElementById('bv-trans-block');
  if(translText){tb.style.display='block';document.getElementById('bv-trans').textContent=translText;}
  else tb.style.display='none';

  document.getElementById('bookview').classList.add('on');
}

setTimeout(()=>{fqp.textContent=quotes[0];fqp.classList.add('vis');},4000);
setInterval(()=>{fqp.classList.remove('vis');

},10000);

function delay(ms){return new Promise(r=>setTimeout(r,ms));}
